services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: support_backend
    command: sh -c "composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader && apache2-foreground"
    ports:
      - "8080:80"
    env_file:
      - ./.env
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    depends_on:
      - db

  frontend:
    image: node:20-alpine
    container_name: support_frontend
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173 --force"
    ports:
      - "5173:5173"
    env_file:
      - ./.env
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

  db:
    image: mysql:8.4
    container_name: support_db
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/docker/mysql/initdb.d:/docker-entrypoint-initdb.d

volumes:
  db_data:
  backend_vendor:
