services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: support_backend
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: app
      DB_PASSWORD: app
      DB_DATABASE: support
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db

  frontend:
    image: node:20-alpine
    container_name: support_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

  db:
    image: mysql:8.4
    container_name: support_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: support
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
